<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 140" width="960" height="280">
  <defs>
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>

    <filter id="iconGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feFlood flood-color="#3b82f6" flood-opacity="0.35"/>
      <feComposite in2="blur" operator="in" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Neon glow pulsante para o hexágono -->
    <filter id="neonPulse" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur1"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="8" result="blur2"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="14" result="blur3"/>
      <feMerge>
        <feMergeNode in="blur3"/>
        <feMergeNode in="blur2"/>
        <feMergeNode in="blur1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- === ICONE === -->
  <g transform="translate(30, 25)" filter="url(#iconGlow)">
    <rect width="90" height="90" rx="20" fill="url(#iconGrad)"/>

    <!-- Hexágono interno com neon pulsante -->
    <g transform="translate(45, 45) scale(0.056) translate(-480, 480)" filter="url(#neonPulse)">
      <path
        d="M480-89q-8 0-15.5-2T450-97L150-269q-14-8-22-21.5t-8-30.5v-328q0-17 8.5-31t22.5-22l300-163q7-4 14-5.5t15-1.5q8 0 15 1.5t14 5.5l300 163q14 8 22.5 22t8.5 31v328q0 17-8 30.5T810-269L510-97q-7 4-14.5 6T480-89ZM366-578q23-23 52.5-37.5T480-630q32 0 61.5 14.5T594-578l153-90-267-142-267 142 153 90Zm84 412v-167q-52-14-86-54.5T330-480q0-10 1-21t6-24l-157-93v297l270 155Zm30-224q38 0 64-26.5t26-63.5q0-38-26-64t-64-26q-37 0-63.5 26T390-480q0 37 26.5 63.5T480-390Zm30 224 270-155v-297l-157 93q5 14 6 24.5t1 20.5q0 52-34 92.5T510-333v167Z"
        fill="#e0e7ff"
      >
        <!-- Pulso neon: cor alterna entre branco frio e ciano -->
        <animate attributeName="fill" values="#e0e7ff;#67e8f9;#a5b4fc;#e0e7ff" dur="2.5s" repeatCount="indefinite"/>
      </path>
    </g>

    <!-- Glow ring pulsante ao redor do hexágono -->
    <circle cx="45" cy="45" r="28" fill="none" stroke="#67e8f9" stroke-width="1.5" opacity="0">
      <animate attributeName="opacity" values="0;0.6;0" dur="2.5s" repeatCount="indefinite"/>
      <animate attributeName="r" values="28;36" dur="2.5s" repeatCount="indefinite"/>
      <animate attributeName="stroke-width" values="1.5;0.3" dur="2.5s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- === TEXTO: ETEO NEXUS === -->
  <g transform="translate(140, 62)">
    <text
      font-family="'Segoe UI', system-ui, -apple-system, sans-serif"
      font-size="42"
      font-weight="800"
      fill="#ffffff"
      letter-spacing="-0.5"
      dominant-baseline="central"
    >ETEO</text>

    <text
      x="115"
      font-family="'Segoe UI', system-ui, -apple-system, sans-serif"
      font-size="42"
      font-weight="800"
      fill="#3b82f6"
      letter-spacing="-0.5"
      dominant-baseline="central"
    >NEXUS</text>
  </g>

  <!-- === SUBTITULO === -->
  <text
    x="142"
    y="95"
    font-family="'Segoe UI', system-ui, -apple-system, sans-serif"
    font-size="11"
    font-weight="600"
    fill="#64748b"
    letter-spacing="2"
  >POWERED BY ETEO LABS</text>

</svg>
